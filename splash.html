<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskForge</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      background:linear-gradient(135deg,#0f0f13 0%,#1a1a2e 50%,#0f0f13 100%);
      font-family:'Inter','Segoe UI',system-ui,sans-serif;
    }
    .icon-container{
      width:120px;
      height:120px;
      animation:fadeIn 0.8s ease-out;
    }
    .icon-container svg{
      width:100%;
      height:100%;
    }
    .title{
      margin-top:24px;
      font-size:28px;
      font-weight:700;
      background:linear-gradient(135deg,#a78bfa,#60a5fa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      animation:fadeIn 0.8s ease-out 0.2s both;
    }
    .tagline{
      margin-top:8px;
      font-size:14px;
      color:#6b6890;
      animation:fadeIn 0.8s ease-out 0.4s both;
    }
    .loader{
      margin-top:32px;
      width:40px;
      height:40px;
      border:3px solid rgba(124,110,247,0.2);
      border-top-color:#7c6ef7;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }
    @keyframes spin{
      to{transform:rotate(360deg)}
    }
    @keyframes fadeIn{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>
  <div class="icon-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#7c6ef7"/>
          <stop offset="100%" style="stop-color:#a78bfa"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="100" fill="url(#grad)"/>
      <path d="M140 160 L140 352 L372 352 L372 160 Z M160 180 L352 180 L352 332 L160 332 Z" fill="white" opacity="0.3"/>
      <path d="M160 200 L332 200 L332 220 L160 220 Z" fill="white"/>
      <path d="M160 240 L300 240 L300 260 L160 260 Z" fill="white" opacity="0.8"/>
      <path d="M160 280 L280 280 L280 300 L160 300 Z" fill="white" opacity="0.6"/>
      <circle cx="340" cy="340" r="40" fill="#22d3a0"/>
      <path d="M325 340 L335 350 L355 330" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="title">TaskForge</div>
  <div class="tagline">Forge your productivity</div>
  <div class="loader"></div>
  <script>
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);
  </script>
</body>
</html>
