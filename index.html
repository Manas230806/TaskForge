<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskForge — To-Do App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#7c6ef7"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --app-bg:#0f0f13;--card:#18181f;--card2:#1e1e28;--border1:#2a2a38;--border2:#3a3a50;
  --accent:#7c6ef7;--accent2:#a78bfa;--accent3:#c4b5fd;
  --success:#22d3a0;--danger:#f87171;--warning:#fbbf24;
  --text1:#f1f0ff;--text2:#ffffff;--text3:#6b6890;
  --radius-sm:6px;--radius-md:10px;--radius-lg:16px;
  --font:'Inter','Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--app-bg);color:var(--text1);min-height:100vh;overflow-x:hidden}

.app-shell{display:flex;flex-direction:column;min-height:100vh;transition:background .4s cubic-bezier(.4,0,.2,1)}
.app-shell.epic-mode{background:linear-gradient(135deg,#0d0d1a 0%,#150d2e 40%,#0d1a26 100%)}
.app-shell.immersive-mode{background:#0a1628}

/* ── Top Bar ─────────────────────────────── */
.topbar{display:flex;align-items:center;gap:12px;padding:14px 24px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border1);position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.logo{font-size:18px;font-weight:700;letter-spacing:-.4px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stats-bar{display:flex;gap:8px;margin-left:8px}
.stat-chip{background:rgba(255,255,255,.04);border:1px solid var(--border1);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px}
.stat-chip span{font-weight:600;color:var(--text1)}
.mode-badges{display:flex;gap:6px;margin-left:auto}
.mode-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .25s;font-family:var(--font)}
.mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.mode-btn.active-epic{background:linear-gradient(135deg,#4f1f8a,#2a1060);border-color:#7c3aed;color:#c4b5fd;box-shadow:0 0 14px rgba(124,62,237,.35)}
.mode-btn.active-immersive{background:linear-gradient(135deg,#0a3350,#051e35);border-color:#0ea5e9;color:#7dd3fc;box-shadow:0 0 12px rgba(14,165,233,.3)}

/* ── Notification Bar ────────────────────── */
.notif-bar{display:flex;align-items:center;gap:10px;padding:9px 24px;font-size:12px;border-bottom:1px solid var(--border1);transition:all .3s}
.notif-bar.denied{background:rgba(248,113,113,.08);color:#fca5a5;border-color:rgba(248,113,113,.2)}
.notif-bar.granted{background:rgba(34,211,160,.08);color:#6ee7b7;border-color:rgba(34,211,160,.2)}
.notif-bar.default{background:rgba(251,191,36,.08);color:#fde68a;border-color:rgba(251,191,36,.2)}
.notif-bar i{font-size:15px;flex-shrink:0}
.notif-btn{margin-left:auto;padding:4px 14px;border-radius:20px;border:1px solid currentColor;background:transparent;color:inherit;font-size:11px;cursor:pointer;font-family:var(--font);font-weight:500;transition:background .2s}
.notif-btn:hover{background:rgba(255,255,255,.12)}

/* ── Layout ──────────────────────────────── */
.main-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:215px;padding:14px 10px;border-right:1px solid var(--border1);display:flex;flex-direction:column;gap:3px;flex-shrink:0;overflow-y:auto}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--text3);padding:8px 8px 4px;text-transform:uppercase}
.filter-btn{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text2);font-size:13px;cursor:pointer;width:100%;text-align:left;font-family:var(--font);transition:all .2s}
.filter-btn:hover{background:rgba(255,255,255,.05);color:var(--text1)}
.filter-btn.active{background:rgba(124,110,247,.15);color:var(--accent2)}
.filter-btn i{font-size:15px;width:17px;flex-shrink:0}
.filter-count{margin-left:auto;font-size:11px;background:rgba(255,255,255,.08);padding:1px 7px;border-radius:10px;font-weight:600}
.filter-btn.active .filter-count{background:rgba(124,110,247,.3);color:#c4b5fd}
.sidebar-sep{height:1px;background:var(--border1);margin:6px 4px}

.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Add Task ────────────────────────────── */
.add-task-bar{background:rgba(255,255,255,.04);border:1px solid var(--border1);border-radius:var(--radius-md);padding:13px 16px;display:flex;flex-direction:column;gap:11px;transition:border-color .2s}
.add-task-bar:focus-within{border-color:var(--accent)}
.add-row1{display:flex;align-items:center;gap:10px}
.add-input{flex:1;background:transparent;border:none;color:var(--text1);font-size:14px;outline:none;font-family:var(--font)}
.add-input::placeholder{color:var(--text3)}
.add-row2{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row2-label{font-size:11px;color:var(--text3);white-space:nowrap}
.mini-select{background:var(--card2);border:1px solid var(--border1);color:var(--text2);border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:var(--font);outline:none;transition:border-color .2s}
.mini-select:focus{border-color:var(--accent)}
.pri-pick{display:flex;gap:4px}
.pri-dot{width:17px;height:17px;border-radius:50%;cursor:pointer;transition:transform .15s;opacity:.55;border:2px solid transparent}
.pri-dot:hover,.pri-dot.sel{transform:scale(1.28);opacity:1}
.pri-dot.sel{border-color:rgba(255,255,255,.6)}
.pri-dot.low{background:#22d3a0}.pri-dot.med{background:#fbbf24}.pri-dot.high{background:#f87171}
.reminder-row{display:flex;align-items:center;gap:8px;padding:7px 11px;background:rgba(124,110,247,.07);border:1px solid rgba(124,110,247,.2);border-radius:var(--radius-sm)}
.reminder-row i{color:var(--accent2);font-size:15px;flex-shrink:0}
.reminder-row span{font-size:12px;color:var(--text2)}
.time-input{background:var(--card2);border:1px solid var(--border1);color:var(--text1);border-radius:5px;padding:4px 8px;font-size:11px;font-family:var(--font);outline:none;cursor:pointer;transition:border-color .2s}
.time-input:focus{border-color:var(--accent)}
.add-btn{padding:7px 18px;border-radius:var(--radius-sm);background:var(--accent);border:none;color:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;font-family:var(--font);white-space:nowrap}
.add-btn:hover{background:var(--accent2);transform:scale(1.03)}
.add-btn:active{transform:scale(.97)}

/* ── Search + Sort ───────────────────────── */
.search-sort{display:flex;gap:8px;align-items:center}
.search-bar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border1);border-radius:var(--radius-sm);padding:7px 13px;flex:1;transition:border-color .2s}
.search-bar:focus-within{border-color:var(--accent)}
.search-bar i{color:var(--text3);font-size:15px;flex-shrink:0}
.search-input{background:transparent;border:none;color:var(--text1);font-size:13px;outline:none;font-family:var(--font);width:100%}
.search-input::placeholder{color:var(--text3)}
.sort-row{display:flex;gap:5px;align-items:center;flex-shrink:0}
.sort-label{font-size:11px;color:var(--text3)}
.sort-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border1);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--font)}
.sort-btn:hover{border-color:var(--border2);color:var(--text2)}
.sort-btn.active{border-color:var(--accent);color:var(--accent2);background:rgba(124,110,247,.1)}

/* ── Progress ────────────────────────────── */
.progress-card{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.03);border:1px solid var(--border1);border-radius:var(--radius-md);padding:13px 18px}
.pct-text{font-size:30px;font-weight:700;color:var(--text1);min-width:60px}
.prog-details{flex:1}
.prog-sub-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.prog-bar-bg{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:5px}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.prog-sub{font-size:11px;color:var(--text3)}
.prog-stats{display:flex;gap:16px}
.prog-stat{text-align:center}
.prog-stat-val{font-size:17px;font-weight:700}
.prog-stat-lab{font-size:10px;color:var(--text3)}

/* ── Section header ──────────────────────── */
.section-head{display:flex;align-items:center;gap:8px}
.section-title{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text3)}
.section-line{flex:1;height:1px;background:var(--border1)}
.section-count{font-size:11px;color:var(--text3);background:rgba(255,255,255,.05);padding:1px 7px;border-radius:10px}

/* ── Task Cards ──────────────────────────── */
.task-list{display:flex;flex-direction:column;gap:5px}
.task-card{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--border1);border-radius:var(--radius-md);padding:12px 14px;transition:all .22s;position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.task-card.low::before{background:var(--success)}.task-card.med::before{background:var(--warning)}.task-card.high::before{background:var(--danger)}
.task-card:hover{border-color:var(--border2);background:var(--card2);transform:translateX(2px)}
.task-card.done{opacity:.45}
.task-card.done .task-title{text-decoration:line-through;color:var(--text3)}
.task-card.epic-card{border-color:rgba(124,62,237,.3);box-shadow:0 0 18px rgba(124,62,237,.15)}
.task-card.imm-card{border-color:rgba(0,212,255,.2);box-shadow:0 0 14px rgba(0,212,255,.12)}
.task-card.has-reminder::after{content:'🔔';position:absolute;right:11px;top:10px;font-size:11px;opacity:.7}

.check-btn{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .2s}
.check-btn:hover{border-color:var(--success)}
.check-btn.checked{background:var(--success);border-color:var(--success)}
.check-btn i{font-size:11px;color:#fff;display:none}
.check-btn.checked i{display:block}

.task-body{flex:1;min-width:0;padding-right:20px}
.task-title{font-size:14px;color:var(--text1);line-height:1.4;word-break:break-word}
.task-meta{display:flex;gap:5px;align-items:center;margin-top:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag.cat-work{background:rgba(96,165,250,.15);color:#7dd3fc}
.tag.cat-personal{background:rgba(167,139,250,.15);color:#c4b5fd}
.tag.cat-health{background:rgba(34,211,160,.15);color:#6ee7b7}
.tag.cat-learning{background:rgba(251,191,36,.15);color:#fde68a}
.tag.cat-finance{background:rgba(248,113,113,.15);color:#fca5a5}
.pri-label{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.pri-label.low{background:rgba(34,211,160,.15);color:#6ee7b7}
.pri-label.med{background:rgba(251,191,36,.15);color:#fde68a}
.pri-label.high{background:rgba(248,113,113,.15);color:#fca5a5}
.reminder-badge{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--accent2);background:rgba(124,110,247,.12);padding:2px 8px;border-radius:20px}
.reminder-badge i{font-size:11px}
.age-badge{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3)}
.age-badge i{font-size:11px}
.task-actions{display:flex;gap:4px;margin-top:7px;opacity:0;transition:opacity .2s}
.task-card:hover .task-actions{opacity:1}
.act-btn{background:rgba(255,255,255,.05);border:none;border-radius:4px;padding:3px 9px;color:var(--text2);font-size:10px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:3px;transition:all .15s}
.act-btn:hover{background:rgba(255,255,255,.1);color:var(--text1)}
.act-btn.del:hover{background:rgba(248,113,113,.15);color:var(--danger)}
.act-btn.snooze:hover{background:rgba(124,110,247,.15);color:var(--accent2)}

/* ── Mode headers ────────────────────────── */
.mode-header-epic{background:rgba(124,62,237,.08);border:1px solid rgba(124,62,237,.25);border-radius:var(--radius-md);padding:13px 18px;display:flex;align-items:center;gap:12px}
.mode-header-epic i{font-size:24px;color:#9f7aea}
.mode-header-epic h3{font-size:14px;font-weight:600;color:#c4b5fd;margin-bottom:2px}
.mode-header-epic p{font-size:12px;color:var(--text3)}
.mode-header-imm{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:var(--radius-md);padding:13px 18px;display:flex;align-items:center;gap:12px}
.mode-header-imm i{font-size:24px;color:#22d3ee}
.mode-header-imm h3{font-size:14px;font-weight:600;color:#7dd3fc;margin-bottom:2px}
.mode-header-imm p{font-size:12px;color:var(--text3)}

/* ── Empty state ─────────────────────────── */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state i{font-size:40px;margin-bottom:10px;display:block;opacity:.4}
.empty-state p{font-size:13px}

/* ── Toast ───────────────────────────────── */
.toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:999;pointer-events:none}
.toast{background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius-md);padding:11px 15px;font-size:12px;color:var(--text1);display:flex;align-items:center;gap:10px;pointer-events:auto;animation:slideIn .3s ease;max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.success{border-color:rgba(34,211,160,.3);background:rgba(34,211,160,.07)}
.toast.reminder{border-color:rgba(124,110,247,.4);background:rgba(124,110,247,.09)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}
.toast.removing{animation:slideOut .3s ease forwards}

/* ── Responsive ──────────────────────────── */
@media(max-width:680px){
  .sidebar{display:none}
  .topbar{padding:12px 16px}
  .content{padding:14px 16px}
  .stats-bar{display:none}
  .add-row2{gap:6px}
  .reminder-row{flex-wrap:wrap}
}
</style>
</head>
<body>

<div class="app-shell" id="appShell">

  <!-- Top Bar -->
  <div class="topbar">
    <i class="ti ti-checkbox" style="color:var(--accent);font-size:22px"></i>
    <div class="logo">TaskForge</div>
    <div class="stats-bar">
      <div class="stat-chip"><i class="ti ti-list-check" style="font-size:12px"></i><span id="statDone">0</span> done</div>
      <div class="stat-chip"><i class="ti ti-bell" style="font-size:12px;color:var(--accent2)"></i><span id="statRem">0</span> reminders</div>
    </div>
    <div class="mode-badges">
      <button class="mode-btn" id="btnNormal" onclick="setMode('normal')">Normal</button>
      <button class="mode-btn" id="btnEpic" onclick="setMode('epic')">⚡ Epic</button>
      <button class="mode-btn" id="btnImm" onclick="setMode('immersive')">🌊 Immersive</button>
    </div>
  </div>

  <!-- Notification Bar -->
  <div class="notif-bar default" id="notifBar">
    <i class="ti ti-bell" id="notifIcon"></i>
    <span id="notifMsg">Enable browser notifications to get task reminders even when you switch tabs.</span>
    <button class="notif-btn" id="notifBtn" onclick="requestNotifPermission()">Enable reminders</button>
  </div>

  <div class="main-layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-label">Views</div>
      <button class="filter-btn active" id="fAll" onclick="setFilter('all')"><i class="ti ti-layout-list"></i>All tasks<span class="filter-count" id="fcAll">0</span></button>
      <button class="filter-btn" id="fToday" onclick="setFilter('today')"><i class="ti ti-sun"></i>Today<span class="filter-count" id="fcToday">0</span></button>
      <button class="filter-btn" id="fReminders" onclick="setFilter('reminders')"><i class="ti ti-bell" style="color:var(--accent2)"></i>Reminders<span class="filter-count" id="fcReminders">0</span></button>
      <button class="filter-btn" id="fDone" onclick="setFilter('done')"><i class="ti ti-circle-check"></i>Completed<span class="filter-count" id="fcDone">0</span></button>
      <button class="filter-btn" id="fHigh" onclick="setFilter('high')"><i class="ti ti-alert-triangle" style="color:#f87171"></i>High priority<span class="filter-count" id="fcHigh">0</span></button>
      <div class="sidebar-sep"></div>
      <div class="sidebar-label">Categories</div>
      <button class="filter-btn" id="fWork" onclick="setFilter('work')"><i class="ti ti-briefcase" style="color:#7dd3fc"></i>Work<span class="filter-count" id="fcWork">0</span></button>
      <button class="filter-btn" id="fPersonal" onclick="setFilter('personal')"><i class="ti ti-user" style="color:#c4b5fd"></i>Personal<span class="filter-count" id="fcPersonal">0</span></button>
      <button class="filter-btn" id="fHealth" onclick="setFilter('health')"><i class="ti ti-heart" style="color:#6ee7b7"></i>Health<span class="filter-count" id="fcHealth">0</span></button>
      <button class="filter-btn" id="fLearning" onclick="setFilter('learning')"><i class="ti ti-book" style="color:#fde68a"></i>Learning<span class="filter-count" id="fcLearning">0</span></button>
      <button class="filter-btn" id="fFinance" onclick="setFilter('finance')"><i class="ti ti-coin" style="color:#fca5a5"></i>Finance<span class="filter-count" id="fcFinance">0</span></button>
    </div>

    <!-- Main Content -->
    <div class="content" id="contentArea">
      <div id="modeHeader"></div>

      <!-- Add Task -->
      <div class="add-task-bar">
        <div class="add-row1">
          <i class="ti ti-plus" style="color:var(--text3);font-size:16px"></i>
          <input class="add-input" id="taskInput" placeholder="Add a task… press Enter" autocomplete="off"/>
        </div>
        <div class="add-row2">
          <span class="row2-label">Category:</span>
          <select class="mini-select" id="catSelect">
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="health">Health</option>
            <option value="learning">Learning</option>
            <option value="finance">Finance</option>
          </select>
          <span class="row2-label" style="margin-left:4px">Priority:</span>
          <div class="pri-pick">
            <div class="pri-dot low sel" id="pdLow" onclick="setPri('low')" title="Low priority"></div>
            <div class="pri-dot med" id="pdMed" onclick="setPri('med')" title="Medium priority"></div>
            <div class="pri-dot high" id="pdHigh" onclick="setPri('high')" title="High priority"></div>
          </div>
          <div class="reminder-row">
            <i class="ti ti-bell"></i>
            <span>Remind me at:</span>
            <input type="time" class="time-input" id="remindTime"/>
            <input type="date" class="time-input" id="remindDate"/>
          </div>
          <button class="add-btn" onclick="addTask()">Add task</button>
        </div>
      </div>

      <!-- Search + Sort -->
      <div class="search-sort">
        <div class="search-bar">
          <i class="ti ti-search"></i>
          <input class="search-input" id="searchInput" placeholder="Search tasks…" oninput="render()"/>
        </div>
        <div class="sort-row">
          <span class="sort-label">Sort:</span>
          <button class="sort-btn active" id="sortDate" onclick="setSort('date')">Date</button>
          <button class="sort-btn" id="sortPri" onclick="setSort('priority')">Priority</button>
          <button class="sort-btn" id="sortReminder" onclick="setSort('reminder')">Reminder</button>
          <button class="sort-btn" id="sortAlpha" onclick="setSort('alpha')">A–Z</button>
        </div>
      </div>

      <div id="progressArea"></div>
      <div id="taskArea"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ── Service Worker Registration ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then((reg) => console.log('Service Worker registered', reg))
      .catch((err) => console.log('Service Worker registration failed', err));
  });
}

// ── State ──────────────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('tf_tasks') || 'null') || [
  {id:1,title:'Finish project proposal',cat:'work',pri:'high',done:false,created:Date.now()-86400000*2,reminder:null},
  {id:2,title:'Morning run 5km',cat:'health',pri:'med',done:false,created:Date.now()-3600000,reminder:null},
  {id:3,title:'Review investment portfolio',cat:'finance',pri:'high',done:true,created:Date.now()-86400000,reminder:null},
  {id:4,title:'Read "Atomic Habits" chapter 3',cat:'learning',pri:'low',done:false,created:Date.now()-7200000,reminder:null},
  {id:5,title:'Call mom',cat:'personal',pri:'high',done:false,created:Date.now()-1800000,reminder:null},
];
let nextId = Math.max(0,...tasks.map(t=>t.id)) + 1;
let mode = 'normal', filter = 'all', sort = 'date', selPri = 'low';
let timers = {};

function save(){ localStorage.setItem('tf_tasks', JSON.stringify(tasks)); }

// ── Defaults ───────────────────────────────────────────────────────────────
function setDefaultDate(){
  const d = new Date(); d.setMinutes(d.getMinutes()+30);
  document.getElementById('remindDate').value = d.toISOString().split('T')[0];
  document.getElementById('remindTime').value = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
setDefaultDate();

// ── Priority ───────────────────────────────────────────────────────────────
function setPri(p){
  selPri = p;
  ['Low','Med','High'].forEach(x => document.getElementById('pd'+x).classList.toggle('sel', x.toLowerCase()===p));
}

// ── Mode ───────────────────────────────────────────────────────────────────
function setMode(m){
  mode = m;
  const shell = document.getElementById('appShell');
  shell.className = 'app-shell' + (m==='epic'?' epic-mode':m==='immersive'?' immersive-mode':'');
  ['Normal','Epic','Imm'].forEach(x => document.getElementById('btn'+x).classList.remove('active-epic','active-immersive'));
  if(m==='epic') document.getElementById('btnEpic').classList.add('active-epic');
  if(m==='immersive') document.getElementById('btnImm').classList.add('active-immersive');
  render();
}

// ── Filter & Sort ──────────────────────────────────────────────────────────
function setFilter(f){
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const map={all:'fAll',today:'fToday',reminders:'fReminders',done:'fDone',high:'fHigh',work:'fWork',personal:'fPersonal',health:'fHealth',learning:'fLearning',finance:'fFinance'};
  if(map[f]) document.getElementById(map[f]).classList.add('active');
  render();
}
function setSort(s){
  sort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const map={date:'sortDate',priority:'sortPri',reminder:'sortReminder',alpha:'sortAlpha'};
  if(map[s]) document.getElementById(map[s]).classList.add('active');
  render();
}

// ── Notifications ──────────────────────────────────────────────────────────
function requestNotifPermission(){
  if(!('Notification' in window)){ updateNotifBar('denied'); return; }
  Notification.requestPermission().then(p => updateNotifBar(p));
}
function updateNotifBar(perm){
  const bar=document.getElementById('notifBar'), msg=document.getElementById('notifMsg');
  const btn=document.getElementById('notifBtn'), icon=document.getElementById('notifIcon');
  bar.className = 'notif-bar ' + perm;
  if(perm==='granted'){
    icon.className='ti ti-bell-check';
    msg.textContent='Reminders are on — you\'ll get a browser notification when each task is due.';
    btn.textContent='Send test'; btn.onclick=testNotification;
  } else if(perm==='denied'){
    icon.className='ti ti-bell-off';
    msg.textContent='Notifications blocked. Click the 🔒 icon in your browser address bar → Notifications → Allow.';
    btn.textContent='Dismiss'; btn.onclick=()=>document.getElementById('notifBar').style.display='none';
  } else {
    icon.className='ti ti-bell';
    msg.textContent='Enable browser notifications to get task reminders even when you switch tabs.';
    btn.textContent='Enable reminders'; btn.onclick=requestNotifPermission;
  }
}
function testNotification(){
  if(Notification.permission==='granted'){
    playNotificationSound();
    if('vibrate' in navigator){
      navigator.vibrate([200, 100, 200]);
    }
    new Notification('TaskForge 🔔',{body:'Reminders are working! You\'ll be notified for your tasks.'});
    showToast('Test notification sent!','success');
  }
}

// ── Reminder Scheduling ────────────────────────────────────────────────────
function scheduleReminder(task){
  if(!task.reminder) return;
  if(timers[task.id]) clearTimeout(timers[task.id]);
  const delay = task.reminder - Date.now();
  if(delay <= 0) return;
  timers[task.id] = setTimeout(() => fireReminder(task), delay);
}
function fireReminder(task){
  if(task.done) return;
  
  // Play notification sound
  playNotificationSound();
  
  // Vibrate on mobile
  if('vibrate' in navigator){
    navigator.vibrate([200, 100, 200]);
  }
  
  if(Notification.permission==='granted'){
    const n = new Notification('TaskForge Reminder 🔔',{
      body:task.title,
      tag:'task-'+task.id,
      requireInteraction:true,
      silent:false
    });
    n.onclick = () => { window.focus(); n.close(); };
  }
  showToast('⏰ Reminder: ' + task.title, 'reminder');
}

function playNotificationSound(){
  // Create audio context for better mobile support
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  oscillator.frequency.value = 800;
  oscillator.type = 'sine';
  gainNode.gain.value = 0.3;
  
  oscillator.start();
  gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
  oscillator.stop(audioCtx.currentTime + 0.5);
}
function cancelReminder(id){ if(timers[id]){ clearTimeout(timers[id]); delete timers[id]; } }
function snoozeReminder(id){
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.reminder = Date.now() + 10*60*1000;
  scheduleReminder(t); save();
  showToast('Snoozed 10 minutes — ' + t.title, 'reminder');
  render();
}

// ── Add Task ───────────────────────────────────────────────────────────────
function addTask(){
  const inp = document.getElementById('taskInput');
  const title = inp.value.trim(); if(!title) return;
  const cat = document.getElementById('catSelect').value;
  const timeVal = document.getElementById('remindTime').value;
  const dateVal = document.getElementById('remindDate').value;
  let reminder = null;
  if(timeVal && dateVal){
    reminder = new Date(dateVal + 'T' + timeVal).getTime();
    if(reminder <= Date.now()) reminder = null;
  }
  const task = {id:nextId++, title, cat, pri:selPri, done:false, created:Date.now(), reminder};
  tasks.unshift(task);
  if(reminder) scheduleReminder(task);
  inp.value='';
  setDefaultDate();
  save();
  showToast(reminder ? 'Task added with reminder at '+formatReminder(reminder) : 'Task added', 'success');
  render();
}
function toggleDone(id){
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.done = !t.done;
  if(t.done){ cancelReminder(id); showToast('Task completed ✓','success'); }
  save(); render();
}
function deleteTask(id){
  cancelReminder(id);
  tasks = tasks.filter(x=>x.id!==id);
  save(); render();
}

// ── Formatting ─────────────────────────────────────────────────────────────
function formatReminder(ts){
  if(!ts) return '';
  const d = new Date(ts), today = new Date();
  const isToday = d.toDateString()===today.toDateString();
  const hh = d.getHours().toString().padStart(2,'0');
  const mm = d.getMinutes().toString().padStart(2,'0');
  if(isToday) return 'Today ' + hh + ':' + mm;
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + ' ' + hh + ':' + mm;
}
function formatAge(ts){
  const d = (Date.now()-ts)/1000;
  if(d<60) return 'just now';
  if(d<3600) return Math.floor(d/60)+'m ago';
  if(d<86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}
function isPast(ts){ return ts && ts < Date.now(); }

// ── Filtered + Sorted List ─────────────────────────────────────────────────
function getFiltered(){
  let list = [...tasks];
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  if(q) list = list.filter(t=>t.title.toLowerCase().includes(q)||t.cat.includes(q));
  if(filter==='today') list = list.filter(t=>Date.now()-t.created<86400000&&!t.done);
  else if(filter==='reminders') list = list.filter(t=>t.reminder&&!t.done);
  else if(filter==='done') list = list.filter(t=>t.done);
  else if(filter==='high') list = list.filter(t=>t.pri==='high'&&!t.done);
  else if(['work','personal','health','learning','finance'].includes(filter)) list = list.filter(t=>t.cat===filter);
  if(sort==='priority'){ const o={high:0,med:1,low:2}; list.sort((a,b)=>o[a.pri]-o[b.pri]); }
  else if(sort==='alpha') list.sort((a,b)=>a.title.localeCompare(b.title));
  else if(sort==='reminder') list.sort((a,b)=>(a.reminder||Infinity)-(b.reminder||Infinity));
  else list.sort((a,b)=>b.created-a.created);
  return list;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  const done = tasks.filter(t=>t.done).length;
  const remCount = tasks.filter(t=>t.reminder&&!t.done).length;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statRem').textContent = remCount;

  const counts={
    all:tasks.length, today:tasks.filter(t=>Date.now()-t.created<86400000&&!t.done).length,
    reminders:remCount, done, high:tasks.filter(t=>t.pri==='high'&&!t.done).length,
    work:tasks.filter(t=>t.cat==='work').length, personal:tasks.filter(t=>t.cat==='personal').length,
    health:tasks.filter(t=>t.cat==='health').length, learning:tasks.filter(t=>t.cat==='learning').length,
    finance:tasks.filter(t=>t.cat==='finance').length,
  };
  [['fcAll','all'],['fcToday','today'],['fcReminders','reminders'],['fcDone','done'],['fcHigh','high'],
   ['fcWork','work'],['fcPersonal','personal'],['fcHealth','health'],['fcLearning','learning'],['fcFinance','finance']
  ].forEach(([el,k])=>{ const e=document.getElementById(el); if(e) e.textContent=counts[k]; });

  // Mode header
  const mh = document.getElementById('modeHeader');
  if(mode==='epic') mh.innerHTML=`<div class="mode-header-epic"><i class="ti ti-bolt"></i><div><h3>⚡ Epic Mode</h3><p>Maximum focus. Every completed task is a victory.</p></div></div>`;
  else if(mode==='immersive') mh.innerHTML=`<div class="mode-header-imm"><i class="ti ti-ripple"></i><div><h3>🌊 Immersive Mode</h3><p>Deep work space. Distraction-free flow state.</p></div></div>`;
  else mh.innerHTML='';

  // Progress
  const total = tasks.length;
  const pct = total>0 ? Math.round((done/total)*100) : 0;
  const fillColor = mode==='epic'
    ? 'linear-gradient(90deg,#7c3aed,#9f7aea)'
    : mode==='immersive'
    ? 'linear-gradient(90deg,#0ea5e9,#22d3ee)'
    : 'linear-gradient(90deg,#7c6ef7,#a78bfa)';
  document.getElementById('progressArea').innerHTML=`<div class="progress-card">
    <div class="pct-text">${pct}%</div>
    <div class="prog-details">
      <div class="prog-sub-label">Overall progress</div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      <div class="prog-sub">${done} of ${total} tasks completed</div>
    </div>
    <div class="prog-stats">
      <div class="prog-stat"><div class="prog-stat-val" style="color:var(--danger)">${tasks.filter(t=>t.pri==='high'&&!t.done).length}</div><div class="prog-stat-lab">urgent</div></div>
      <div class="prog-stat"><div class="prog-stat-val" style="color:var(--accent2)">${remCount}</div><div class="prog-stat-lab">reminders</div></div>
      <div class="prog-stat"><div class="prog-stat-val" style="color:var(--success)">${done}</div><div class="prog-stat-lab">done</div></div>
    </div>
  </div>`;

  // Task cards
  function taskCard(t){
    const cc = mode==='epic'?' epic-card':mode==='immersive'?' imm-card':'';
    const remPast = isPast(t.reminder);
    return `<div class="task-card ${t.pri} ${t.done?'done':''} ${cc} ${t.reminder?'has-reminder':''}">
      <button class="check-btn ${t.done?'checked':''}" onclick="toggleDone(${t.id})">
        <i class="ti ti-check"></i>
      </button>
      <div class="task-body">
        <div class="task-title">${escHtml(t.title)}</div>
        <div class="task-meta">
          <span class="tag cat-${t.cat}">${t.cat}</span>
          <span class="pri-label ${t.pri}">${t.pri}</span>
          ${t.reminder ? `<span class="reminder-badge" style="${remPast?'opacity:.45':''}">
            <i class="ti ti-bell"></i>${remPast?'Passed: ':''}${formatReminder(t.reminder)}
          </span>` : ''}
          <span class="age-badge"><i class="ti ti-clock"></i>${formatAge(t.created)}</span>
        </div>
        ${!t.done ? `<div class="task-actions">
          <button class="act-btn" onclick="toggleDone(${t.id})"><i class="ti ti-check"></i> Done</button>
          ${t.reminder ? `<button class="act-btn snooze" onclick="snoozeReminder(${t.id})"><i class="ti ti-clock-pause"></i> Snooze 10m</button>` : ''}
          <button class="act-btn del" onclick="deleteTask(${t.id})"><i class="ti ti-trash"></i> Delete</button>
        </div>` : ''}
      </div>
    </div>`;
  }

  const list = getFiltered();
  const active = list.filter(t=>!t.done);
  const completed = list.filter(t=>t.done);
  let html = '';
  if(active.length>0){
    html += `<div class="section-head"><div class="section-title">Tasks</div><div class="section-line"></div><div class="section-count">${active.length}</div></div>`;
    html += `<div class="task-list">${active.map(taskCard).join('')}</div>`;
  }
  if(completed.length>0){
    html += `<div class="section-head" style="margin-top:8px"><div class="section-title">Completed</div><div class="section-line"></div><div class="section-count">${completed.length}</div></div>`;
    html += `<div class="task-list">${completed.map(taskCard).join('')}</div>`;
  }
  if(active.length===0 && completed.length===0){
    html = `<div class="empty-state"><i class="ti ti-clipboard-check"></i><p>No tasks here — add one above to get started.</p></div>`;
  }
  document.getElementById('taskArea').innerHTML = html;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, type){
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' '+type : '');
  const icon = type==='success' ? 'circle-check' : type==='reminder' ? 'bell' : 'info-circle';
  const color = type==='success' ? 'var(--success)' : type==='reminder' ? 'var(--accent2)' : 'var(--text2)';
  t.innerHTML = `<i class="ti ti-${icon}" style="font-size:16px;flex-shrink:0;color:${color}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{ t.classList.add('removing'); setTimeout(()=>t.remove(),300); }, 3800);
}

// ── Boot ───────────────────────────────────────────────────────────────────
document.getElementById('taskInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });
if('Notification' in window) updateNotifBar(Notification.permission);
else updateNotifBar('denied');
tasks.forEach(scheduleReminder);
render();
setInterval(render, 30000); // refresh timestamps every 30s
</script>
</body>
</html>
